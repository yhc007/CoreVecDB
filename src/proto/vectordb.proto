syntax = "proto3";

package vectordb;

service VectorService {
  // Collection management
  rpc CreateCollection (CreateCollectionRequest) returns (CreateCollectionResponse);
  rpc ListCollections (ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc GetCollectionInfo (GetCollectionInfoRequest) returns (CollectionInfo);
  rpc DeleteCollection (DeleteCollectionRequest) returns (DeleteCollectionResponse);

  // Vector operations (with collection)
  rpc Upsert (UpsertRequest) returns (UpsertResponse);
  rpc UpsertBatch (UpsertBatchRequest) returns (UpsertBatchResponse);
  rpc Search (SearchRequest) returns (SearchResponse);

  // Streaming operations
  rpc StreamUpsert (stream StreamUpsertRequest) returns (StreamUpsertResponse);
  rpc StreamUpsertBidi (stream StreamUpsertRequest) returns (stream StreamUpsertProgress);
  rpc Get (GetRequest) returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc DeleteBatch (DeleteBatchRequest) returns (DeleteBatchResponse);
  rpc Update (UpdateRequest) returns (UpdateResponse);
  rpc UpdateMetadata (UpdateMetadataRequest) returns (UpdateMetadataResponse);

  // Snapshot operations
  rpc CreateSnapshot (CreateSnapshotRequest) returns (SnapshotInfo);
  rpc ListSnapshots (ListSnapshotsRequest) returns (ListSnapshotsResponse);
  rpc RestoreSnapshot (RestoreSnapshotRequest) returns (CollectionInfo);
  rpc DeleteSnapshot (DeleteSnapshotRequest) returns (DeleteSnapshotResponse);

  // Maintenance operations
  rpc Compact (CompactRequest) returns (CompactResponse);

  // Replication operations
  rpc GetReplicationStatus (ReplicationStatusRequest) returns (ReplicationStatusResponse);
  rpc GetWalEntries (GetWalEntriesRequest) returns (GetWalEntriesResponse);
}

// ============================================================================
// Collection Management
// ============================================================================

message CreateCollectionRequest {
  string name = 1;
  uint32 dim = 2;
  string distance = 3;  // "euclidean" or "cosine"
  bool quantization_enabled = 4;
  repeated string indexed_fields = 5;
  repeated string numeric_fields = 6;
}

message CreateCollectionResponse {
  CollectionInfo info = 1;
  bool success = 2;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
  repeated CollectionInfo collections = 1;
}

message GetCollectionInfoRequest {
  string collection = 1;
}

message CollectionInfo {
  string name = 1;
  uint32 dim = 2;
  uint64 vector_count = 3;
  uint64 deleted_count = 4;
  string distance_metric = 5;
  bool quantization_enabled = 6;
  repeated string indexed_fields = 7;
  repeated string numeric_fields = 8;
}

message DeleteCollectionRequest {
  string collection = 1;
}

message DeleteCollectionResponse {
  bool success = 1;
}

// ============================================================================
// Vector Operations
// ============================================================================

message Vector {
  repeated float elements = 1;
}

message UpsertRequest {
  string collection = 1;  // Collection name (empty = default)
  uint64 id = 2;
  Vector vector = 3;
  map<string, string> metadata = 4;
}

message UpsertResponse {
  uint64 id = 1;
  bool success = 2;
}

message UpsertBatchRequest {
  string collection = 1;
  repeated BatchVector vectors = 2;
}

message BatchVector {
  Vector vector = 1;
  map<string, string> metadata = 2;
}

message UpsertBatchResponse {
  uint64 start_id = 1;
  uint32 count = 2;
  bool success = 3;
}

// Streaming upsert - send vectors in chunks
message StreamUpsertRequest {
  string collection = 1;        // Collection name (set in first message)
  repeated BatchVector vectors = 2;  // Chunk of vectors
  bool is_last = 3;             // True if this is the last chunk
}

// Final response after all vectors are inserted
message StreamUpsertResponse {
  uint64 total_inserted = 1;
  uint64 start_id = 2;
  uint64 end_id = 3;
  bool success = 4;
  string error = 5;
}

// Progress update during bidirectional streaming
message StreamUpsertProgress {
  uint64 inserted_so_far = 1;
  uint64 current_chunk_start_id = 2;
  uint32 current_chunk_count = 3;
  float progress_percent = 4;    // 0-100
  bool is_complete = 5;
}

message SearchRequest {
  string collection = 1;
  Vector vector = 2;
  uint32 k = 3;
  map<string, string> filter = 4;
  repeated uint64 filter_ids = 5;
  repeated RangeFilter range_filters = 6;
}

message RangeFilter {
  string field = 1;
  string op = 2;  // "gt", "gte", "lt", "lte", "range", "between"
  double value = 3;  // For gt, gte, lt, lte
  double min = 4;    // For range, between
  double max = 5;    // For range, between
}

message SearchResult {
  uint64 id = 1;
  float score = 2;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message GetRequest {
  string collection = 1;
  uint64 id = 2;
}

message GetResponse {
  uint64 id = 1;
  Vector vector = 2;
  map<string, string> metadata = 3;
  bool found = 4;
}

message DeleteRequest {
  string collection = 1;
  uint64 id = 2;
}

message DeleteResponse {
  uint64 id = 1;
  bool deleted = 2;
}

message DeleteBatchRequest {
  string collection = 1;
  repeated uint64 ids = 2;
}

message DeleteBatchResponse {
  uint32 deleted_count = 1;
  uint32 requested_count = 2;
}

message UpdateRequest {
  string collection = 1;
  uint64 id = 2;
  Vector vector = 3;
  map<string, string> metadata = 4;
}

message UpdateResponse {
  uint64 old_id = 1;
  uint64 new_id = 2;
  bool updated = 3;
}

message UpdateMetadataRequest {
  string collection = 1;
  uint64 id = 2;
  map<string, string> metadata = 3;
}

message UpdateMetadataResponse {
  uint64 id = 1;
  bool updated = 2;
}

// ============================================================================
// Snapshot Operations
// ============================================================================

message CreateSnapshotRequest {
  string collection = 1;
}

message SnapshotInfo {
  string name = 1;
  string collection = 2;
  string created_at = 3;  // ISO 8601 timestamp
  uint64 vector_count = 4;
  uint64 size_bytes = 5;
}

message ListSnapshotsRequest {
  string collection = 1;
}

message ListSnapshotsResponse {
  repeated SnapshotInfo snapshots = 1;
}

message RestoreSnapshotRequest {
  string snapshot_name = 1;
  string new_collection_name = 2;  // Optional, empty = use original name
}

message DeleteSnapshotRequest {
  string snapshot_name = 1;
}

message DeleteSnapshotResponse {
  bool success = 1;
}

// ============================================================================
// Maintenance Operations
// ============================================================================

message CompactRequest {
  string collection = 1;
}

message CompactResponse {
  uint64 vectors_before = 1;
  uint64 vectors_after = 2;
  uint64 vectors_removed = 3;
  uint64 bytes_reclaimed = 4;
  bool success = 5;
}

// ============================================================================
// Replication Operations
// ============================================================================

message ReplicationStatusRequest {}

message ReplicationStatusResponse {
  string role = 1;              // "primary", "replica", "standalone"
  uint64 current_seq = 2;       // Current WAL sequence number
  uint64 wal_entries = 3;       // Total WAL entries
  uint64 wal_size_bytes = 4;    // Total WAL size
  string replica_status = 5;    // For replicas: sync status
  string primary_addr = 6;      // For replicas: primary address
  uint64 last_synced_seq = 7;   // For replicas: last synced sequence
}

message GetWalEntriesRequest {
  uint64 from_seq = 1;          // Get entries after this sequence number
  uint32 max_entries = 2;       // Maximum entries to return (0 = all)
}

message WalEntryProto {
  uint64 seq = 1;
  string timestamp = 2;         // ISO 8601
  string operation_type = 3;    // "insert", "delete", etc.
  string collection = 4;
  bytes operation_data = 5;     // JSON-encoded operation details
}

message GetWalEntriesResponse {
  repeated WalEntryProto entries = 1;
  uint64 current_seq = 2;       // Current sequence number on server
  bool has_more = 3;            // True if more entries available
}
