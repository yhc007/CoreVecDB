[server]
grpc_port = 50061
http_port = 3100
data_dir = "data"

[index]
dim = 1024
max_elements = 10000
m = 24
ef_construction = 400

[quantization]
enabled = true
keep_originals = false
rerank_oversample = 3

[payload]
index_enabled = true
indexed_fields = ["category", "type", "status"]
numeric_fields = ["price", "rating", "timestamp"]

[cache]
query_cache_enabled = true
query_cache_size = 1000
query_cache_ttl_seconds = 60
filter_cache_enabled = true
filter_cache_size = 500
